name: XAU Signal Bot

on:
  workflow_dispatch:          # cho phép bấm chạy thủ công / cron-job.org gọi qua API dispatch

permissions:
  contents: write   # cần quyền ghi để bot tự lưu lại các file trạng thái về repo

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python xau_signal_bot.py

      # Lưu lại 4 FILE TRẠNG THÁI về repo - GitHub Actions reset hệ thống file mỗi lần
      # chạy, file nào không commit là mất sạch:
      # - signal_log.json        : lịch sử tín hiệu + thống kê thắng/thua
      # - flipped_levels.json    : sổ mức đổi vai (kháng cự <-> hỗ trợ)
      # - box_state.json         : box đã xác nhận đang ghim chờ retest
      # - h1_native_cache.json   : cache nến H1 gốc theo giờ - KHÔNG commit file này thì
      #   mỗi lần chạy đều gọi API H1 -> 864 credits/ngày, VƯỢT trần free 800
      # Dùng "git add -A --" để commit được cả trường hợp file BỊ XÓA (vd: bot gỡ ghim
      # box_state.json) - thiếu điều này thì ghim cũ sẽ "sống dậy" ở lần chạy sau.
      - name: Lưu lại trạng thái bot
        run: |
          git config user.name "xau-signal-bot"
          git config user.email "actions@github.com"
          for f in signal_log.json flipped_levels.json box_state.json h1_native_cache.json; do
            git add -A -- "$f" 2>/dev/null || true
          done
          git diff --cached --quiet || git commit -m "Cập nhật trạng thái bot [skip ci]"
          git pull --rebase
          git push
